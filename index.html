<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>NEXUS SCHOOL // Sistem Sekolah Cyberpunk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="bg-grid"></div>
<canvas id="particle-canvas"></canvas>
<div class="scanline"></div>

<div id="loading-screen">
  <div class="load-ring"></div>
  <div class="load-text">MENGHUBUNGKAN KE NEXUS.SERVER...</div>
</div>

<div id="toast-wrap"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="glass auth-card">
    <div class="auth-logo">
      <div class="dot"></div>
      <div class="auth-title neon-text">NEXUS SCHOOL</div>
    </div>
    <div class="auth-sub">SISTEM MANAJEMEN SEKOLAH // AI NEON GRID</div>

    <form id="login-form" class="mt20">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="kamu@sekolah.id" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="field flex items-center gap8" style="margin-top:14px;">
        <input type="checkbox" id="remember-me" checked style="width:16px;height:16px;">
        <label style="margin:0; text-transform:none; font-size:12px; letter-spacing:0;" for="remember-me">Ingat saya di perangkat ini</label>
      </div>
      <button type="submit" class="btn btn-solid btn-block" id="login-btn">// Masuk Sistem</button>
      <div class="auth-error" id="login-error"></div>
    </form>

    <form id="register-form" class="mt20" style="display:none;">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="reg-name" placeholder="Nama kamu" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="kamu@sekolah.id" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 karakter" required minlength="6">
      </div>
      <button type="submit" class="btn btn-solid btn-block" id="register-btn">// Daftar Akun</button>
      <div class="auth-error" id="register-error"></div>
    </form>

    <div class="auth-switch" id="auth-switch-wrap">
      Belum punya akun? <span id="go-register">Daftar di sini</span>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div id="sidebar-overlay"></div>
  <aside id="sidebar" class="glass">
    <div class="side-brand">
      <div class="mark">🛰️</div>
      <div class="name">NEXUS<small>SCHOOL SYSTEM</small></div>
    </div>
    <nav id="nav-list"></nav>
    <div class="side-foot">
      <button class="btn btn-danger btn-block btn-sm" id="logout-btn">⏻ Keluar</button>
    </div>
  </aside>

  <div id="main-wrap">
    <header id="topbar">
      <div class="topbar-left">
        <button id="menu-toggle">☰</button>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="theme-toggle" title="Ganti tema">🌙</button>
        <div class="user-chip">
          <div class="avatar" id="user-avatar">?</div>
          <div>
            <div id="user-name" style="font-size:12px;">-</div>
          </div>
          <span class="role-badge" id="user-role">-</span>
        </div>
      </div>
    </header>
    <main id="content"></main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="glass modal-box" id="modal-box">
    <div class="modal-head">
      <div class="panel-title neon-text" id="modal-title">Form</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn" id="modal-cancel">Batal</button>
      <button class="btn btn-solid" id="modal-save">Simpan</button>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/crud.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/chat.js"></script>
<script src="js/calendar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
